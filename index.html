
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Reproductor</title>

  <style>
    body {
      background-color: #000;
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      flex-direction: column;
    }

    .play-btn {
      width: 220px;
      height: 220px;
      border-radius: 70%;
      background-color: #e6e6e6;
      border: none;
      font-size: 60px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .platform-btn {
      width: 260px;
      padding: 20px;
      margin-top: 20px;
      border-radius: 25px;
      font-size: 20px;
      border: none;
      cursor: pointer;
    }

    .spotify {
      background-color: #1DB954;
      color: white;
    }

    .apple {
      background-color: #FA243C;
      color: white;
    }

    .text {
      margin-top: 20px;
      color: #888;
      font-size: 14px;
    }
    @media (max-width: 600px) {

  .play-btn {
    transform: scale(1.8);
  }

  .platform-btn {
    font-size: 22px;
    padding: 18px;
  }

}
  </style>
</head>

<body>

  <button class="play-btn" onclick="play()">▶</button>

  <button class="platform-btn spotify" onclick="openSpotify()">Spotify</button>
  <button class="platform-btn apple" onclick="openApple()">Apple Music</button>

  <div class="text">Pulsa para escuchar</div>

  <!-- CARGA CORRECTA DEL ARCHIVO -->
  <script src="./tracks.js"></script>
  <script>
console.log("TRACKS:", typeof tracks);
</script>

  <!-- LÓGICA CORREGIDA -->
  <script>
    window.onload = function() {

      const params = new URLSearchParams(window.location.search);
      const id = parseInt(params.get("id"));

      const track = tracks.find(t => t.id === id);

      function play() {
        if (!track) {
          alert("Track no encontrado");
          return;
        }

        if (track.spotify) {
          window.location.href = track.spotify;
        } else if (track.apple) {
          window.location.href = track.apple;
        } else {
          alert("No hay enlace disponible");
        }
      }

      function openSpotify() {
        if (!track || !track.spotify) {
          alert("Spotify no disponible");
          return;
        }
        window.location.href = track.spotify;
      }

      function openApple() {
        if (!track || !track.apple) {
          alert("Apple Music no disponible");
          return;
        }
        window.location.href = track.apple;
      }

      // MUY IMPORTANTE: conectar botones
      window.play = play;
      window.openSpotify = openSpotify;
      window.openApple = openApple;

    };
  </script>

</body>
</html>

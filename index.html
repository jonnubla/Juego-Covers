<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Pista</title>
<style>
body {
    margin: 0;
    background: black;
    color: white;
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.container {
    text-align: center;
}
.play {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    background: white;
    border: none;
    font-size: 40px;
    cursor: pointer;
}
.buttons {
    margin-top: 20px;
    display: none;
}
.btn {
    display: block;
    margin: 10px auto;
    padding: 12px 30px;
    border-radius: 20px;
    border: none;
    font-size: 16px;
    cursor: pointer;
}
.spotify {
    background: #1DB954;
    color: white;
}
.apple {
    background: #FA243C;
    color: white;
}
</style>
</head>

<body>

<div class="container">
    <button class="play" onclick="play()">▶</button>

    <div class="buttons" id="buttons">
        <button class="btn spotify" onclick="openSpotify()">Spotify</button>
        <button class="btn apple" onclick="openApple()">Apple Music</button>
    </div>

    <p style="opacity:0.5;">Pulsa para escuchar</p>
</div>

<script>

// 🔥 TUS CANCIONES (solo ejemplo, luego metemos todas)
const tracks = {
    1: {
        spotify: "https://open.spotify.com/intl-es/track/6ZQgooEk8PvsLxedYaT6Oa?si=af4583271e874c34",
        apple: "https://music.apple.com/es/album/a-mi-manera-comme-dhabitude/1512944635?i=1512944831"
    },
    2: {
        spotify: "https://open.spotify.com/intl-es/track/xxxxxxxx",
        apple: "https://music.apple.com/es/album/xxxxxxxx"
    }
};

// 🔑 Leer ID correctamente UNA VEZ
const params = new URLSearchParams(window.location.search);
const trackId = parseInt(params.get("id"), 10);

// Validación
if (!trackId || !tracks[trackId]) {
    document.body.innerHTML = "<h1>Error: canción no encontrada</h1>";
}

// Guardamos track fijo
const track = tracks[trackId];

// ▶️ BOTÓN PRINCIPAL
function play() {
    document.getElementById("buttons").style.display = "block";

    // Abre directamente (Spotify si hay, si no Apple)
    if (track.spotify) {
        window.open(track.spotify, "_blank");
    } else {
        window.open(track.apple, "_blank");
    }
}

// BOTONES
function openSpotify() {
    if (track.spotify) {
        window.open(track.spotify, "_blank");
    }
}

function openApple() {
    if (track.apple) {
        window.open(track.apple, "_blank");
    }
}

</script>

</body>
</html>

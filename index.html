<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Pista</title>

<style>
body {
    margin: 0;
    background: black;
    color: white;
    font-family: Arial;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.container {
    text-align: center;
}
.play {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    background: white;
    font-size: 40px;
    border: none;
    cursor: pointer;
}
.buttons {
    margin-top: 20px;
    display: none;
}
.btn {
    display: block;
    margin: 10px auto;
    padding: 12px 25px;
    border-radius: 20px;
    border: none;
    cursor: pointer;
}
.spotify { background: #1DB954; color: white; }
.apple { background: #FA243C; color: white; }
</style>
</head>

<body>

<div class="container">
    <button class="play" id="playBtn">▶</button>

    <div class="buttons" id="buttons">
        <button class="btn spotify" id="spotifyBtn">Spotify</button>
        <button class="btn apple" id="appleBtn">Apple Music</button>
    </div>

    <p style="opacity:0.5;">Pulsa para escuchar</p>
</div>

<script>

// 🔥 DATOS (PRUEBA SOLO CON 1 CANCIÓN BIEN)
const tracks = {
    1: {
        spotify: "https://open.spotify.com/intl-es/track/6ZQgooEk8PvsLxedYaT6Oa?si=af4583271e874c34",
        apple: "https://music.apple.com/es/album/a-mi-manera-comme-dhabitude/1512944635?i=1512944831"
    }
};

// 👉 Leer ID UNA VEZ y fijarlo
const urlParams = new URLSearchParams(window.location.search);
const trackId = parseInt(urlParams.get("id"), 10);

// Validación fuerte
if (!trackId || !tracks[trackId]) {
    document.body.innerHTML = "<h1>Error: ID no válido</h1>";
    throw new Error("ID inválido");
}

// 👉 Guardar canción fija (NO cambia nunca)
const currentTrack = tracks[trackId];

// 👉 BOTÓN PLAY
document.getElementById("playBtn").addEventListener("click", function() {

    // Mostrar botones
    document.getElementById("buttons").style.display = "block";

    // Abrir canción correcta
    const url = currentTrack.spotify || currentTrack.apple;
    window.open(url, "_blank");

});

// 👉 BOTONES DIRECTOS
document.getElementById("spotifyBtn").addEventListener("click", function() {
    if (currentTrack.spotify) {
        window.open(currentTrack.spotify, "_blank");
    }
});

document.getElementById("appleBtn").addEventListener("click", function() {
    if (currentTrack.apple) {
        window.open(currentTrack.apple, "_blank");
    }
});

</script>

</body>
</html>

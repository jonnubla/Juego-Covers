<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Reproductor</title>

  <style>
    body {
      background-color: #000;
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      flex-direction: column;
    }

    /* BOTÓN PLAY */
    .play-btn {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background-color: #e6e6e6;
      border: none;
      font-size: 40px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.1s ease;
    }

    .play-btn:active {
      transform: scale(0.95);
    }

    /* BOTONES PLATAFORMA */
    .platform-btn {
      width: 180px;
      padding: 12px;
      margin-top: 15px;
      border-radius: 25px;
      font-size: 16px;
      border: none;
      cursor: pointer;
      transition: transform 0.1s ease;
    }

    .platform-btn:active {
      transform: scale(0.95);
    }

    .spotify {
      background-color: #1DB954;
      color: white;
    }

    .apple {
      background-color: #FA243C;
      color: white;
      border: 2px solid #ffffff33;
    }

    .text {
      margin-top: 20px;
      color: #888;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <button class="play-btn" onclick="play()">▶</button>

  <button class="platform-btn spotify" onclick="openSpotify()">Spotify</button>
  <button class="platform-btn apple" onclick="openApple()">Apple Music</button>

  <div class="text">Pulsa para escuchar</div>

  <script src="./tracks.js"></script>

  <script>
    const params = new URLSearchParams(window.location.search);
    const id = parseInt(params.get("id"));

    const track = tracks.find(t => t.id === id);

    function play() {
      if (!track) {
        alert("Track no encontrado");
        return;
      }
      window.location.href = track.spotify;
    }

    function openSpotify() {
      if (!track) {
        alert("Track no encontrado");
        return;
      }
      window.location.href = track.spotify;
    }

    function openApple() {
      if (!track) {
        alert("Track no encontrado");
        return;
      }
      window.location.href = track.apple;
    }
  </script>

</body>
</html>
